name: Test Yahoo Options Access

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Install quantmod
        run: |
          install.packages("quantmod")
        shell: Rscript {0}

      - name: Try fetching AAPL option chain
        run: |
          library(quantmod)
          cat("=== Testing getOptionChain on GitHub runner ===\n")
          cat("Runner location is typically US (Azure datacenters)\n\n")

          result <- tryCatch({
            opts <- getOptionChain("AAPL")
            cat("SUCCESS! Got option chain.\n")
            cat("Structure:\n")
            str(opts, max.level = 2)
            cat("\nFirst few calls:\n")
            print(head(opts$calls))
            cat("\nColumn names:\n")
            print(colnames(opts$calls))
            "ok"
          }, error = function(e) {
            cat("FAILED with error:\n")
            cat(conditionMessage(e), "\n")
            "fail"
          })

          cat("\n=== Result:", result, "===\n")
        shell: Rscript {0}
